name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Write cert to disk
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import cert into temp keychain
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make temp keychain the default for this job
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Export identity name for use in build script
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          rm /tmp/certificate.p12

      - name: Build release DMGs
        run: bash scripts/build-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: QuickTuner ${{ github.ref_name }}
          body: |
            ## QuickTuner ${{ github.ref_name }}

            ### What's fixed
            - Fixed app icon not displaying correctly
            - Rewrote audio engine in pure Swift — eliminates Obj-C++ dependency and improves stability
            - Added Restart button to clear string check marks

            ### Install
            - **Apple Silicon (M1/M2/M3/M4):** Download `QuickTuner-*-arm64.dmg`
            - **Intel Mac:** Download `QuickTuner-*-x86_64.dmg`

            Open the DMG, drag QuickTuner to Applications.

            ### Requirements
            - macOS 15.0 or later
          files: dist/*.dmg
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
